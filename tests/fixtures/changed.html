<!DOCTYPE html>
<html>
<head>
    <title>Test Simple Shop - Mutated Layout</title>
</head>
<body>
    <div id="main-container" class="wrapper-v2">
        <!-- Structural div added to simulate container layout change -->
        <main class="content-panel">
            <div class="product-item" id="item-998">
                <!-- product-title changed to product-header -->
                <h2 class="product-header">Premium Wireless Headphone</h2>
                <div class="cost-container">
                    <!-- price-value class changed to amount -->
                    <span class="amount">$299.99</span>
                    <span class="currency">USD</span>
                </div>
                <p class="summary-text">High quality sound with active noise cancellation features.</p>
                <!-- buy-btn ID changed -->
                <button class="purchase-btn" id="checkout-btn">Buy Now</button>
            </div>
        </main>
    </div>
</body>
</html>
