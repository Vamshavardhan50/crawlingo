name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  python-wheels:
    name: Build Python Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 Linux builds)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: sdk/python
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import crawlingo; print(crawlingo.__version__)"
          CIBW_BEFORE_ALL: pip install maturin


  npm-native:
    name: Build & Publish NPM Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build native module
        working-directory: sdk/nodejs
        run: |
          npm ci
          npm run build
        env:
          RUSTFLAGS: -C target-cpu=native

      - name: Test native module
        working-directory: sdk/nodejs
        run: npm test || true

      - name: Pack NPM package
        working-directory: sdk/nodejs
        run: npm pack --dry-run 2>&1 | tail -20

      - name: Publish to NPM
        if: github.event_name == 'release'
        working-directory: sdk/nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Cross-platform test to ensure core works
  test-core:
    name: Test Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --workspace --verbose
      - name: Build Python extension
        run: |
          cd sdk/python
          pip install maturin
          maturin build --features python --release
      - name: Quick Python import test
        run: |
          cd sdk/python
          pip install -e . --no-build-isolation
          python -c "from crawlingo import Page; p = Page('https://example.com'); print('Page OK:', p.title())"

  # Ensure version consistency
  verify-version:
    name: Verify Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          python_version=$(grep '^version' sdk/python/pyproject.toml | head -1 | cut -d'"' -f2)
          node_version=$(grep '"version"' sdk/nodejs/package.json | head -1 | cut -d'"' -f4)
          echo "Cargo version: $cargo_version"
          echo "Python version: $python_version"
          echo "Node.js version: $node_version"
          if [ "$cargo_version" != "$python_version" ] || [ "$cargo_version" != "$node_version" ]; then
            echo "Version mismatch!"
            exit 1
          fi
          echo "All versions match: $cargo_version"