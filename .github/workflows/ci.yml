name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --verbose

  python:
    name: Python (${{ matrix.os }} / ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          - os: windows-latest
            python: '3.8'
          - os: windows-latest
            python: '3.9'
          - os: macos-latest
            python: '3.8'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-python-${{ matrix.python }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'sdk/python/pyproject.toml') }}
      - name: Build Python extension
        working-directory: sdk/python
        run: python -m pip install .
      - name: Smoke test Python package
        run: python -c "from importlib.metadata import version; import crawlingo; assert crawlingo.__version__ == version('crawlingo'); assert crawlingo.Page"

  nodejs:
    name: Node.js (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/nodejs/native/target
          key: ${{ runner.os }}-node-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'sdk/nodejs/package-lock.json', 'sdk/nodejs/native/Cargo.toml') }}
      - name: Build native module
        working-directory: sdk/nodejs
        run: |
          npm ci
          npm run build
          npm run build:ts
      - name: Smoke test Node.js package
        working-directory: sdk/nodejs
        run: npm pack --dry-run

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check versions match
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          python_version=$(grep '^version' sdk/python/pyproject.toml | head -1 | cut -d'"' -f2)
          node_version=$(grep '"version"' sdk/nodejs/package.json | head -1 | cut -d'"' -f4)
          echo "Cargo: $cargo_version"
          echo "Python: $python_version"
          echo "Node.js: $node_version"
          if [ "$cargo_version" != "$python_version" ] || [ "$cargo_version" != "$node_version" ]; then
            echo "::error::Version mismatch!"
            exit 1
          fi
